apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: opentraum
  labels:
    app: gateway
    app.kubernetes.io/part-of: opentraum
    app.kubernetes.io/component: gateway
spec:
  revisionHistoryLimit: 2
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
        app.kubernetes.io/part-of: opentraum
        app.kubernetes.io/component: gateway
    spec:
      terminationGracePeriodSeconds: 10
      imagePullSecrets:
        - name: harbor-secret
      containers:
        - name: gateway
          image: amdp-registry.skala-ai.com/skala26a-cloud/opentraum-gateway:6a6c8055b9644cf5f22a16af33c0724d5808cce7
          ports:
            - containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: opentraum-config
          resources:
            requests:
              memory: "128Mi"
              cpu: "250m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 3
            timeoutSeconds: 3
            failureThreshold: 20
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
      restartPolicy: Always
