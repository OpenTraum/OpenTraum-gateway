server:
  port: 8080

spring:
  application:
    name: opentraum-gateway

  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600

  # Redis (JWT 블랙리스트 확인)
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

# JWT (auth-service와 동일한 secret 공유)
jwt:
  secret: ${JWT_SECRET:opentraum-default-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256}

# Actuator & Prometheus
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus, gateway
  endpoint:
    health:
      show-details: when-authorized
    gateway:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

# Logging
logging:
  level:
    root: INFO
    com.opentraum.gateway: DEBUG
    org.springframework.cloud.gateway: DEBUG

---
# Dev Profile
spring:
  config:
    activate:
      on-profile: dev

  cloud:
    gateway:
      routes:
        # Auth Service (8081)
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/auth/**

        # User Service (8082)
        - id: user-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/users/**,/api/v1/tenants/**

        # Event Service (8083) - 공연/스케줄/좌석
        - id: event-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/concerts/**,/api/v1/schedules/**,/api/v1/admin/seats/**

        # Reservation Service (8084) - 예매/대기열/라이브/추첨
        - id: reservation-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/reservations/**,/api/v1/queue/**,/api/v1/live/**,/api/v1/lottery/**

        # Payment Service (8085)
        - id: payment-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/v1/payment/**

logging:
  level:
    root: DEBUG
    com.opentraum.gateway: TRACE

---
# Prod Profile (K8s service names)
spring:
  config:
    activate:
      on-profile: prod

  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://auth-service:8081
          predicates:
            - Path=/api/v1/auth/**

        - id: user-service
          uri: http://user-service:8082
          predicates:
            - Path=/api/v1/users/**,/api/v1/tenants/**

        - id: event-service
          uri: http://event-service:8083
          predicates:
            - Path=/api/v1/concerts/**,/api/v1/schedules/**,/api/v1/admin/seats/**

        - id: reservation-service
          uri: http://reservation-service:8084
          predicates:
            - Path=/api/v1/reservations/**,/api/v1/queue/**,/api/v1/live/**,/api/v1/lottery/**

        - id: payment-service
          uri: http://payment-service:8085
          predicates:
            - Path=/api/v1/payment/**

logging:
  level:
    root: WARN
    com.opentraum.gateway: INFO

management:
  endpoint:
    health:
      show-details: never
