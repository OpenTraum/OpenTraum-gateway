server:
  port: 8080

spring:
  application:
    name: opentraum-gateway

  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600

# Actuator & Prometheus
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus, gateway
  endpoint:
    health:
      show-details: when-authorized
    gateway:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

# Logging
logging:
  level:
    root: INFO
    com.opentraum.gateway: DEBUG
    org.springframework.cloud.gateway: DEBUG

---
# Dev Profile
spring:
  config:
    activate:
      on-profile: dev

  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - StripPrefix=1
        - id: user-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/users/**
          filters:
            - StripPrefix=1
        - id: event-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/events/**
          filters:
            - StripPrefix=1
        - id: reservation-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/reservations/**
          filters:
            - StripPrefix=1
        - id: payment-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/v1/payments/**
          filters:
            - StripPrefix=1

logging:
  level:
    root: DEBUG
    com.opentraum.gateway: TRACE

---
# Prod Profile
spring:
  config:
    activate:
      on-profile: prod

  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://auth-service:8081
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - StripPrefix=1
        - id: user-service
          uri: http://user-service:8082
          predicates:
            - Path=/api/v1/users/**
          filters:
            - StripPrefix=1
        - id: event-service
          uri: http://event-service:8083
          predicates:
            - Path=/api/v1/events/**
          filters:
            - StripPrefix=1
        - id: reservation-service
          uri: http://reservation-service:8084
          predicates:
            - Path=/api/v1/reservations/**
          filters:
            - StripPrefix=1
        - id: payment-service
          uri: http://payment-service:8085
          predicates:
            - Path=/api/v1/payments/**
          filters:
            - StripPrefix=1

logging:
  level:
    root: WARN
    com.opentraum.gateway: INFO

management:
  endpoint:
    health:
      show-details: never
